<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>2am</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0f1a;
        color: #fdf6ee;
        font-family: -apple-system, system-ui, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }
      .mark {
        font-size: 40px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #f8c8a8, #ee9b78);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .sub {
        font-size: 13px;
        color: rgba(253, 246, 238, 0.5);
      }
    </style>
  </head>
  <body>
    <!--
      Native shell entry point. Paints the branded screen synchronously so
      WKWebView never shows a blank window, then JS-redirects to the live
      site. If the network is unreachable, the user stays on this screen
      instead of seeing white — fixes the App Store Guideline 2.1 rejection.
    -->
    <div class="wrap">
      <div class="mark">2am</div>
      <div class="sub">myla’s always up.</div>
    </div>
    <noscript>open hey2am.app in your browser.</noscript>
    <script>
      setTimeout(function () {
        window.location.replace("https://hey2am.app/app");
      }, 1000);
    </script>
  </body>
</html>
